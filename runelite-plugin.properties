description=Tracks accurate session profit (banking-aware, so bank trips are not counted as losses), a complete loot feed, total net worth (bank + inventory + equipment + GE), XP gained, and GE flip P&L, alongside a live gear DPS and max-hit calculator. All valuation uses RuneLite's built-in GE prices. The only optional network feature, OFF by default, is a price-trend lookup that sends only an item id to the public OSRS Wiki price API.
